<!DOCTYPE html>
<html>

<head>
    <style>
        .slider {
            position: relative;
            max-width: 1000px;
            margin: auto;
            overflow: hidden;
            

        }

         .slider-track {
            display: flex;
            transition: transform 0.5s ease;
        }

        .slide {
            min-width: 33%;
        }

        .slide img {

            width: 100%;
            height: auto;
        }

        .slider-nav {
            text-align: center;
            margin-top: 10px;
        }

        .slider-nav button {
            padding: 8px 15px;
            margin: 0 5px;
        }

    </style>
</head>

<body>
    <div class="slider">
        <div class="slider-track">
            <div class="slide"><img src="image1.jpg" alt="Slide 1"></div>
            <div class="slide"><img src="image2.jpg" alt="Slide 2"></div>
            <div class="slide"><img src="image3.jpg" alt="Slide 3"></div>
            <div class="slide"><img src="image4.jpg" alt="Slide 4"></div>
            <div class="slide"><img src="image5.jpg" alt="Slide 5"></div>
            <div class="slide"><img src="image6.jpg" alt="Slide 6"></div>
        </div>
        <div class="slider-nav">
            <button class="prev">Previous</button>
            <button class="next">Next</button>
        </div>
    </div>

    <script>
        const track = document.querySelector('.slider-track');
        const slides = Array.from(document.querySelectorAll('.slide'));
        const nextBtn = document.querySelector('.next');
        const prevBtn = document.querySelector('.prev');
        
        let currentIndex = 0;
        
        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % slides.length;
            updateSlider();
        });
        
        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + slides.length) % slides.length;
            updateSlider();
        });
        
        function updateSlider() {
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
        }
    </script>
</body>

</html>
